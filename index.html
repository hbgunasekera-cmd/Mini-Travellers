<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Travellers - Ultimate Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; height: 100vh; margin: 0; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .layout-grid { display: grid; grid-template-columns: 1fr; height: calc(100vh - 64px); }
        @media (min-width: 1024px) { .layout-grid { grid-template-columns: 400px 1fr; } }
        .side-panel { overflow-y: auto; height: 100%; -webkit-overflow-scrolling: touch; border-right: 1px solid #e2e8f0; scroll-behavior: smooth; }
        #map-container { height: 300px; width: 100%; z-index: 1; background: #e5e7eb; }
        @media (min-width: 1024px) { #map-container { height: 100%; } }
        .marker-pending { background-color: #f97316; border: 2px solid white; border-radius: 50%; }
        .marker-done { background-color: #10b981; border: 2px solid white; border-radius: 50%; }
        .marker-selected { background-color: #ef4444; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: 800; }
        @keyframes smart-pulse { 0% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0.7); } 100% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } }
        .marker-smart { background-color: #3b82f6; border: 2px solid white; border-radius: 50%; animation: smart-pulse 2s infinite; }
        .modal-overlay { background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 9999; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-trying:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
            key: "AIzaSyB7OkvfJ1fOwtOY5jw4r2_GK0O7qvUVuPs",
            v: "weekly"
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const SUPABASE_URL = 'https://efzvwticsfhuslsssxbi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vrGlsqC5yUCpt85-9jz0Nw_kjOex8BA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const VALID_CATEGORIES = ["Waterfall", "Mountain", "Trail", "Viewpoint", "Beach", "Park", "Plateaus", "Reserved Forest", "Monastery", "Archaeology", "Reservoir", "Pool", "Stream", "Location"];

        function App() {
            const [userLocation, setUserLocation] = useState(null);
            const [places, setPlaces] = useState([]);
            const [savedRoutes, setSavedRoutes] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterTag, setFilterTag] = useState('All');
            const [selectedTrip, setSelectedTrip] = useState([]);
            const [activeRouteFilter, setActiveRouteFilter] = useState(null);
            const [mapLocked, setMapLocked] = useState(true);
            
            const [showScheduleModal, setShowScheduleModal] = useState(false);
            const [showViewModal, setShowViewModal] = useState(false);
            const [viewingTrip, setViewingTrip] = useState(null);
            const [tripForm, setTripForm] = useState({ id: null, name: '', date: '', remarks: '' });
            const [tempLocation, setTempLocation] = useState(null);
            const [newLocationCategory, setNewLocationCategory] = useState('Location');

            const mapRef = useRef(null);
            const markersLayer = useRef(L.layerGroup());
            const polylineRef = useRef(null);
            const autocompleteRef = useRef(null);

            const fetchData = async () => {
                const { data: p } = await supabaseClient.from('travel_bucket_list').select('*');
                const { data: r } = await supabaseClient.from('saved_travel_routes').select('*').order('created_at', { ascending: false });
                
                const today = new Date().toISOString().split('T')[0];
                const activeRoutes = (r || []).filter(route => route.trip_date >= today);
                const pastRoutes = (r || []).filter(route => route.trip_date < today);
                
                if (pastRoutes.length > 0) {
                    const idsToDelete = pastRoutes.map(pr => pr.id);
                    await supabaseClient.from('saved_travel_routes').delete().in('id', idsToDelete);
                }
                
                setSavedRoutes(activeRoutes || []);
                setPlaces(p || []);
                if (viewingTrip) {
                    const updated = activeRoutes.find(ar => ar.id === viewingTrip.id);
                    if (updated) setViewingTrip(updated);
                }
            };

            useEffect(() => {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        setUserLocation(loc);
                        if (mapRef.current) mapRef.current.setView([loc.lat, loc.lng], 12);
                    }, (err) => console.error("Location error", err));
                }
            }, []);

            useEffect(() => { 
                fetchData(); 
                initGoogle();
                if (!mapRef.current) {
                    mapRef.current = L.map('map-container', { zoomControl: false, attributionControl: false }).setView([7.8731, 80.7718], 7);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapRef.current);
                    markersLayer.current.addTo(mapRef.current);
                }
            }, []);

            useEffect(() => {
                if (!mapRef.current) return;
                mapLocked ? mapRef.current.dragging.disable() : mapRef.current.dragging.enable();
                mapLocked ? mapRef.current.scrollWheelZoom.disable() : mapRef.current.scrollWheelZoom.enable();
            }, [mapLocked]);

            // Fix: Add showViewModal and viewingTrip to dependencies to refresh Lucide icons in details window
            useEffect(() => {
                updateMapElements();
                if (window.lucide) window.lucide.createIcons();
            }, [places, selectedTrip, activeRouteFilter, userLocation, showViewModal, viewingTrip]);

            const initGoogle = async () => {
                const { Autocomplete } = await google.maps.importLibrary("places");
                if (!autocompleteRef.current) return;
                const autocomplete = new Autocomplete(autocompleteRef.current, { componentRestrictions: { country: "lk" } });
                autocomplete.addListener("place_changed", () => {
                    const place = autocomplete.getPlace();
                    if (place.geometry) setTempLocation({ name: place.name, lat: place.geometry.location.lat(), lng: place.geometry.location.lng() });
                });
            };

            const calculateDistance = (lat, lng) => {
                if (!userLocation) return "0.0";
                const d = L.latLng(userLocation.lat, userLocation.lng).distanceTo(L.latLng(lat, lng));
                return (d / 1000).toFixed(1);
            };

            const calculateTripDistance = (wps) => {
                if (!wps || wps.length === 0 || !userLocation) return "0.0";
                let d = 0;
                let last = L.latLng(userLocation.lat, userLocation.lng);
                wps.forEach(p => {
                    const curr = L.latLng(p.latitude, p.longitude);
                    d += last.distanceTo(curr);
                    last = curr;
                });
                return (d / 1000).toFixed(1);
            };

            const stats = useMemo(() => {
                const total = places.length;
                const done = places.filter(p => p.status === 'done').length;
                const percent = total > 0 ? Math.round((done / total) * 100) : 0;
                return { total, done, percent };
            }, [places]);

            const getLocationRoute = (id) => savedRoutes.find(r => r.waypoints && r.waypoints.some(wp => wp.id === id));

            const sortedPlaces = useMemo(() => {
                let filtered = [...places];
                if (activeRouteFilter) {
                    filtered = filtered.filter(p => activeRouteFilter.waypoints && activeRouteFilter.waypoints.some(wp => wp.id === p.id));
                }
                return filtered.sort((a, b) => {
                    if (a.status !== b.status) return a.status === 'pending' ? -1 : 1;
                    const distA = userLocation ? L.latLng(userLocation.lat, userLocation.lng).distanceTo(L.latLng(a.latitude, a.longitude)) : 0;
                    const distB = userLocation ? L.latLng(userLocation.lat, userLocation.lng).distanceTo(L.latLng(b.latitude, b.longitude)) : 0;
                    return distA - distB;
                }).filter(p => p.place_name.toLowerCase().includes(searchTerm.toLowerCase()) && (filterTag === 'All' || p.category === filterTag));
            }, [places, searchTerm, filterTag, activeRouteFilter, userLocation]);

            const handleDeleteLocation = async (id) => {
                if (confirm("Permanently delete this place?")) {
                    await supabaseClient.from('travel_bucket_list').delete().eq('id', id);
                    fetchData();
                }
            };

            const handleToggleStatus = async (id, currentStatus) => {
                await supabaseClient.from('travel_bucket_list')
                    .update({ status: currentStatus === 'done' ? 'pending' : 'done' })
                    .eq('id', id);
                fetchData();
            };

            const handleStartNavigation = (trip) => {
                if (!trip.waypoints || trip.waypoints.length === 0 || !userLocation) return;
                const origin = `${userLocation.lat},${userLocation.lng}`;
                const destination = `${trip.waypoints[trip.waypoints.length-1].latitude},${trip.waypoints[trip.waypoints.length-1].longitude}`;
                const waypoints = trip.waypoints.slice(0, -1).map(wp => `${wp.latitude},${wp.longitude}`).join('|');
                const url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&waypoints=${waypoints}&travelmode=driving`;
                window.open(url, '_blank');
            };

            const handleParticipate = async (route) => {
                const name = prompt("Enter Participant Name:");
                if (!name) return;
                const contact = prompt("Enter Contact Number:");
                if (!contact) return;
                const currentParticipants = typeof route.participants === 'string' ? JSON.parse(route.participants) : (Array.isArray(route.participants) ? route.participants : []);
                const updatedParticipants = [...currentParticipants, { name, contact, id: Date.now() }];
                await supabaseClient.from('saved_travel_routes').update({ participants: updatedParticipants }).eq('id', route.id);
                fetchData();
            };

            const handleRemoveParticipant = async (participantId) => {
                if (!confirm("Remove this participant?")) return;
                const pList = typeof viewingTrip.participants === 'string' ? JSON.parse(viewingTrip.participants) : (Array.isArray(viewingTrip.participants) ? viewingTrip.participants : []);
                const updatedParticipants = pList.filter(p => p.id !== participantId);
                await supabaseClient.from('saved_travel_routes').update({ participants: updatedParticipants }).eq('id', viewingTrip.id);
                setViewingTrip({...viewingTrip, participants: updatedParticipants});
                fetchData();
            };

            const handleRemoveWaypoint = async (tripId, placeId) => {
                if (!confirm("Remove this stop from the trip?")) return;
                const trip = savedRoutes.find(r => r.id === tripId);
                const updatedWaypoints = trip.waypoints.filter(wp => wp.id !== placeId);
                await supabaseClient.from('saved_travel_routes').update({ waypoints: updatedWaypoints }).eq('id', tripId);
                fetchData();
            };

            const handleSaveTrip = async () => {
                if (!tripForm.name || !tripForm.date) return alert("Required fields missing.");
                const payload = { 
                    route_name: tripForm.name, 
                    trip_date: tripForm.date, 
                    remarks: tripForm.remarks, 
                    waypoints: selectedTrip, 
                    participants: [] 
                };
                if (tripForm.id) { await supabaseClient.from('saved_travel_routes').update(payload).eq('id', tripForm.id); } 
                else { await supabaseClient.from('saved_travel_routes').insert([payload]); }
                fetchData(); setSelectedTrip([]); setShowScheduleModal(false); setTripForm({ id: null, name: '', date: '', remarks: '' });
            };

            const handleDeleteTrip = async (id) => {
                if (confirm("Delete trip?")) {
                    await supabaseClient.from('saved_travel_routes').delete().eq('id', id);
                    if (activeRouteFilter?.id === id) setActiveRouteFilter(null);
                    fetchData();
                }
            };

            const updateMapElements = () => {
                markersLayer.current.clearLayers();
                if (polylineRef.current) mapRef.current.removeLayer(polylineRef.current);
                if (userLocation) {
                    L.marker([userLocation.lat, userLocation.lng], { icon: L.divIcon({ className: 'marker-smart', iconSize: [16, 16] }) }).addTo(markersLayer.current);
                }
                const currentWaypoints = activeRouteFilter ? activeRouteFilter.waypoints : selectedTrip;
                places.forEach(p => {
                    if (currentWaypoints && currentWaypoints.find(st => st.id === p.id)) return;
                    let cls = p.status === 'done' ? 'marker-done' : 'marker-pending';
                    L.marker([p.latitude, p.longitude], { icon: L.divIcon({ className: cls, iconSize: [12, 12] }) }).addTo(markersLayer.current);
                });
                if (currentWaypoints && currentWaypoints.length > 0) {
                    currentWaypoints.forEach((p, idx) => {
                        L.marker([p.latitude, p.longitude], { icon: L.divIcon({ className: 'marker-selected', html: `<span>${idx+1}</span>`, iconSize: [24, 24] }) }).addTo(markersLayer.current);
                    });
                    if (userLocation) {
                        polylineRef.current = L.polyline([[userLocation.lat, userLocation.lng], ...currentWaypoints.map(p => [p.latitude, p.longitude])], { color: '#ef4444', weight: 3, dashArray: '8, 12' }).addTo(mapRef.current);
                    }
                }
            };

            return (
                <div className="app-container">
                    <header className="px-6 py-4 bg-white border-b shrink-0 z-10 shadow-sm">
                        <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-2">
                                <i data-lucide="map-pin" className="text-red-500 w-6 h-6"></i>
                                <h1 className="text-lg font-black uppercase tracking-tight">Mini Travellers</h1>
                            </div>
                            <p className="text-xs font-black text-slate-900">{stats.done}/{stats.total} Visited</p>
                        </div>
                        <div className="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div className="h-full bg-emerald-500 transition-all duration-500" style={{ width: `${stats.percent}%` }}></div>
                        </div>
                    </header>

                    <div className="layout-grid">
                        <aside className="side-panel p-4 space-y-6 bg-slate-50 no-scrollbar">
                            <div className="bg-white p-4 rounded-3xl border shadow-sm space-y-3">
                                <input ref={autocompleteRef} placeholder="Search new place..." className="w-full p-3 rounded-2xl bg-slate-50 border outline-none text-sm" />
                                <div className="flex gap-2">
                                    <select value={newLocationCategory} onChange={e=>setNewLocationCategory(e.target.value)} className="flex-1 p-3 rounded-2xl bg-slate-100 text-[10px] font-black uppercase">
                                        {VALID_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <button onClick={async () => {
                                        if (!tempLocation) return;
                                        await supabaseClient.from('travel_bucket_list').insert([{ place_name: tempLocation.name, latitude: tempLocation.lat, longitude: tempLocation.lng, category: newLocationCategory, status: "pending" }]);
                                        fetchData(); setTempLocation(null); autocompleteRef.current.value = "";
                                    }} className="px-6 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase">Add</button>
                                </div>
                            </div>

                            {savedRoutes.length > 0 && (
                                <div className="space-y-3">
                                    <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest px-1">Active Trips</h2>
                                    <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                                        {savedRoutes.map(route => (
                                            <div 
                                                key={route.id} 
                                                onClick={() => setActiveRouteFilter(route)}
                                                className={`relative min-w-[200px] p-4 rounded-3xl border-2 transition-all cursor-pointer ${activeRouteFilter?.id === route.id ? 'bg-slate-900 border-slate-900 text-white' : 'bg-white border-white shadow-sm'}`}
                                            >
                                                <button onClick={(e) => { e.stopPropagation(); handleDeleteTrip(route.id); }} className="absolute top-3 right-3 p-1.5 text-slate-300 hover:text-red-500"><i data-lucide="trash-2" className="w-3 h-3"></i></button>
                                                <h3 className="font-black uppercase text-[10px] truncate pr-6">{route.route_name}</h3>
                                                <p className="text-[8px] font-bold uppercase mt-1 opacity-60">{route.trip_date}</p>
                                                <div className="flex gap-1.5 mt-3">
                                                    <button onClick={(e) => { e.stopPropagation(); setViewingTrip(route); setShowViewModal(true); }} className="px-2.5 py-1.5 bg-blue-500 text-white rounded-lg text-[8px] font-black uppercase">Details</button>
                                                    <button onClick={(e) => { e.stopPropagation(); handleParticipate(route); }} className="px-2.5 py-1.5 bg-slate-100 text-slate-900 rounded-lg text-[8px] font-black uppercase">Join</button>
                                                    {/* Removed Go button from active schedule cards per request */}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="space-y-3 pb-24">
                                <div className="flex gap-2 sticky top-0 bg-slate-50/80 backdrop-blur-md py-2 z-10">
                                    <input value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} placeholder="Filter..." className="flex-1 p-2 rounded-xl bg-white text-xs border" />
                                    <select value={filterTag} onChange={e=>setFilterTag(e.target.value)} className="p-2 rounded-xl bg-white text-xs border">
                                        <option value="All">All</option>
                                        {VALID_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>

                                {sortedPlaces.map(p => {
                                    const isSelected = selectedTrip.find(st=>st.id===p.id);
                                    const assignedRoute = getLocationRoute(p.id);
                                    return (
                                        <div key={p.id} className={`relative rounded-2xl bg-white border-2 p-3 transition-all ${isSelected ? 'border-red-500 bg-red-50' : 'border-white shadow-sm'} ${assignedRoute ? 'opacity-60 ring-2 ring-slate-200' : ''}`}>
                                            <div className="flex justify-between items-start">
                                                <div onClick={() => !assignedRoute && setSelectedTrip(prev => isSelected ? prev.filter(s=>s.id!==p.id) : [...prev,p])} className={`flex-1 ${assignedRoute ? 'cursor-not-allowed' : 'cursor-pointer'}`}>
                                                    <div className="flex items-center gap-2">
                                                        <h3 className="font-black uppercase text-[10px] text-slate-800">{p.place_name}</h3>
                                                    </div>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <span className="text-[8px] font-black text-blue-500 uppercase bg-blue-50 rounded px-2 py-0.5">{p.category}</span>
                                                        <span className="text-[8px] font-bold text-slate-400 uppercase">• {calculateDistance(p.latitude, p.longitude)} KM</span>
                                                    </div>
                                                    {assignedRoute && (
                                                        <p className="mt-2 text-[8px] font-black text-slate-500 bg-slate-100 p-1 px-2 rounded-lg inline-block uppercase">
                                                            <i data-lucide="calendar" className="w-2 h-2 inline mr-1"></i> {assignedRoute.route_name} ({assignedRoute.trip_date})
                                                        </p>
                                                    )}
                                                </div>
                                                <div className="flex flex-col gap-2 ml-2">
                                                    <button onClick={() => handleDeleteLocation(p.id)} className="p-1.5 text-slate-300 hover:text-red-500"><i data-lucide="trash-2" className="w-3.5 h-3.5"></i></button>
                                                    <button onClick={() => handleToggleStatus(p.id, p.status)} className={`p-1.5 rounded-lg border transition-all ${p.status === 'done' ? 'bg-emerald-500 text-white border-emerald-500' : 'text-slate-200 border-slate-100 hover:border-slate-300'}`}><i data-lucide="check" className="w-3.5 h-3.5"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </aside>

                        <main className="relative">
                            <div id="map-container"></div>
                            <button onClick={() => setMapLocked(!mapLocked)} className={`absolute top-4 right-4 z-[1000] p-4 rounded-2xl shadow-xl ${mapLocked ? 'bg-white text-slate-400' : 'bg-blue-600 text-white animate-pulse'}`}>
                                <i data-lucide={mapLocked ? "lock" : "unlock"} className="w-5 h-5"></i>
                            </button>
                        </main>
                    </div>

                    {(selectedTrip.length > 0 || activeRouteFilter) && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white border shadow-2xl rounded-[2rem] p-4 flex items-center justify-between z-[2000]">
                            <div className="pl-2">
                                <p className="text-xs font-black text-slate-900 truncate max-w-[180px] uppercase tracking-tight">{activeRouteFilter ? activeRouteFilter.route_name : `${selectedTrip.length} Locations Selected`}</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => { setSelectedTrip([]); setActiveRouteFilter(null); }} className="p-4 text-red-500 hover:bg-red-50 rounded-2xl"><i data-lucide="x" className="w-5 h-5"></i></button>
                                {!activeRouteFilter && <button onClick={() => setShowScheduleModal(true)} className="px-8 py-4 bg-slate-900 text-white rounded-[1.5rem] text-[10px] font-black uppercase">Schedule Trip</button>}
                            </div>
                        </div>
                    )}

                    {showViewModal && viewingTrip && (
                        <div className="fixed inset-0 z-[5000] modal-overlay p-4 flex items-center justify-center">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-6 max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h2 className="font-black uppercase text-sm tracking-tight">{viewingTrip.route_name}</h2>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">
                                            <i data-lucide="calendar" className="w-3 h-3 inline mr-1"></i> Scheduled: {viewingTrip.trip_date}
                                        </p>
                                    </div>
                                    <button onClick={() => setShowViewModal(false)} className="p-2 bg-slate-50 hover:bg-slate-100 rounded-xl transition-colors"><i data-lucide="x" className="w-4 h-4 text-slate-400"></i></button>
                                </div>

                                <div className="flex gap-4 p-4 bg-slate-50 rounded-2xl">
                                    <div className="flex-1">
                                        <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">Total Distance</p>
                                        <div className="flex items-center gap-2 mt-1">
                                            <i data-lucide="milestone" className="w-4 h-4 text-blue-500"></i>
                                            <p className="text-lg font-black text-slate-900">{calculateTripDistance(viewingTrip.waypoints)} KM</p>
                                        </div>
                                    </div>
                                    {viewingTrip.remarks && (
                                        <div className="flex-[2] border-l pl-4">
                                            <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">Remarks</p>
                                            <p className="text-[10px] font-bold text-slate-600 mt-1 leading-relaxed">{viewingTrip.remarks}</p>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="space-y-6">
                                    <div>
                                        <h3 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3">Trip Stops ({viewingTrip.waypoints?.length || 0})</h3>
                                        <div className="space-y-2">
                                            {(viewingTrip.waypoints || []).map((wp, i) => {
                                                const placeRef = places.find(p => p.id === wp.id);
                                                const isDone = placeRef?.status === 'done';
                                                return (
                                                    <div key={i} className={`flex items-center justify-between p-3 rounded-2xl transition-all ${isDone ? 'bg-emerald-50 border border-emerald-100' : 'bg-slate-50'}`}>
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-[9px] font-black opacity-30 w-4">{i+1}</span>
                                                            <div>
                                                                <p className={`text-[10px] font-black uppercase ${isDone ? 'line-through opacity-40' : ''}`}>{wp.place_name}</p>
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-1">
                                                            <button onClick={() => handleToggleStatus(wp.id, placeRef?.status)} className={`p-1.5 rounded-lg border transition-all ${isDone ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-slate-200 border-slate-200'}`}><i data-lucide="check" className="w-3.5 h-3.5"></i></button>
                                                            <button onClick={() => handleRemoveWaypoint(viewingTrip.id, wp.id)} className="p-1.5 text-slate-300 hover:text-red-500 bg-white rounded-lg border border-slate-200"><i data-lucide="trash-2" className="w-3.5 h-3.5"></i></button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div>
                                        <h3 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3">Participants</h3>
                                        <div className="space-y-2">
                                            {(() => {
                                                // Safety: Handle JSON string vs Object from database
                                                const pList = typeof viewingTrip.participants === 'string' ? JSON.parse(viewingTrip.participants) : (Array.isArray(viewingTrip.participants) ? viewingTrip.participants : []);
                                                return pList.length > 0 ? (
                                                    pList.map((person, idx) => (
                                                        <div key={person.id || idx} className="flex items-center justify-between p-3 bg-blue-50 rounded-2xl border border-blue-100">
                                                            <div className="flex items-center gap-3">
                                                                <div className="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-[10px] font-black uppercase">{person.name ? person.name[0] : '?'}</div>
                                                                <div>
                                                                    <p className="text-[10px] font-black uppercase tracking-tight">{person.name}</p>
                                                                    <p className="text-[8px] font-bold text-slate-400">{person.contact}</p>
                                                                </div>
                                                            </div>
                                                            <button onClick={() => handleRemoveParticipant(person.id)} className="p-2 text-red-300 hover:text-red-600 transition-colors"><i data-lucide="user-minus" className="w-4 h-4"></i></button>
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="p-6 text-center border-2 border-dashed rounded-[2rem]">
                                                        <p className="text-[10px] font-bold text-slate-300 italic uppercase">No participants yet</p>
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-3 sticky bottom-0 bg-white pt-4">
                                    <button onClick={() => handleStartNavigation(viewingTrip)} className="flex-1 py-4 bg-emerald-500 text-white rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-emerald-200">Start Navigation</button>
                                    <button onClick={() => setShowViewModal(false)} className="flex-1 py-4 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase shadow-lg">Close</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showScheduleModal && (
                        <div className="fixed inset-0 z-[5000] modal-overlay p-4 flex items-center justify-center">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 space-y-5 shadow-2xl">
                                <h2 className="font-black uppercase text-sm tracking-tight text-center">Plan New Trip</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Trip Title</label>
                                        <input placeholder="Ex: Weekend Getaway" className="w-full p-4 mt-1 bg-slate-50 border-none outline-none focus:ring-2 focus:ring-slate-200 rounded-2xl text-sm font-bold" value={tripForm.name} onChange={e => setTripForm({...tripForm, name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Trip Date</label>
                                        <input type="date" className="w-full p-4 mt-1 bg-slate-50 border-none outline-none focus:ring-2 focus:ring-slate-200 rounded-2xl text-sm font-bold" value={tripForm.date} onChange={e => setTripForm({...tripForm, date: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Remarks</label>
                                        <textarea placeholder="Any specific notes?" className="w-full p-4 mt-1 bg-slate-50 border-none outline-none focus:ring-2 focus:ring-slate-200 rounded-2xl text-sm font-bold h-24 no-scrollbar" value={tripForm.remarks} onChange={e => setTripForm({...tripForm, remarks: e.target.value})} />
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowScheduleModal(false)} className="flex-1 py-4 text-[10px] font-black uppercase text-slate-400 hover:text-slate-900">Discard</button>
                                    <button onClick={handleSaveTrip} className="flex-1 py-4 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase shadow-lg">Confirm Plan</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
